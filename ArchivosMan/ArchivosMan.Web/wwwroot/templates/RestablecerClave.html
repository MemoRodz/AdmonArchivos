<!DOCTYPE html>
<html lang="es-mx">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Restablecer Clave</title>
</head>
<body style="background-color:#EDF6FF; font-family: Arial, Helvetica, sans-serif;">
    <br />
    <br />
    <div style="
        width:400px;
        border-radius:5px;
        margin:auto;
        background-color:#ffffff;
        box-shadow:0px 0px 10px #DEDEDE;
        padding:20px;">
        <table style="width:100%; border-collapse:collapse;">
            <tr>
                <td align="center" colspan="2">
                    <h2 style="color:#004DAF; margin:0;">Contraseña {{TIPOCAMBIO}}</h2>
                </td>
            </tr>
            <tr>
                <td align="left" colspan="2" style="padding-top:10px;">
                    <p style="margin:0;">Su contraseña fue restablecida:</p>
                </td>
            </tr>
            <tr>
                <td style="padding-top:10px;">
                    <h4 style="color:#004DAF;margin:2px;">Nueva contraseña:</h4>
                </td>
                <td style="padding-top:10px; font-weight:bold;">
                    {{CLAVE}}
                </td>
            </tr>
        </table>
        <div style="
            background-color:#FFE1CE;
            padding:15px;
            margin-top:15px;
            margin-bottom:15px;">
            <p style="margin:0; color:#F45E00;">
                Le recomendamos cambiar la contraseña una vez inicie sesión.
            </p>
        </div>
    </div>
    <br />
    <br />
</body>
</html>
